spring.application.name=microservicios

# ============================
# Servidor
# ============================
server.port=8083

# ============================
# Base de datos PostgreSQL
# ============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5439/perfiles_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:perfiles_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:perfiles_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================
# RabbitMQ
# ============================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:admin}

# ============================
# Swagger / OpenAPI
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
