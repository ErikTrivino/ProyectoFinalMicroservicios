# ============================================================
# Jenkins Configuration as Code (JCasC)
# Reto 6 - Integración Continua
# ============================================================
# Este archivo configura automáticamente Jenkins al arrancar:
#   - Seguridad (usuario admin)
#   - Herramientas (SonarQube Scanner)
#   - Credenciales (SonarQube token)
#   - Jobs (pipelines para cada microservicio)
#   - SCM (repositorio Git para trigger por push)
# ============================================================

jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin123"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  numExecutors: 4

# ============================================================
# Configuración de SonarQube Server
# ============================================================
unclassified:
  sonarGlobalConfiguration:
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonar-token"
        triggers:
          skipScmCause: false
          skipUpstreamCause: false

# ============================================================
# Credenciales
# ============================================================
credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "sonar-token"
              secret: "squ_d65acf0d900f6984d7e1bb607c3f06b097a3bcfa"
              description: "SonarQube Authentication Token"

# ============================================================
# Jobs - Pipelines para microservicios
# ============================================================
# Cada job usa SCM (Git) para obtener el Jenkinsfile del
# repositorio, con pollSCM para disparar al hacer git push.
# ============================================================
jobs:
  - script: |
      pipelineJob('empleados-service-pipeline') {
        description('Pipeline CI para empleados-service (Python/Flask)')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/ErikTrivino/ProyectoFinalMicroservicios.git')
                }
                branch('*/main')
              }
            }
            scriptPath('empleados-service/Jenkinsfile')
            lightweight(true)
          }
        }
        triggers {
          scm('H/5 * * * *')
        }
      }
