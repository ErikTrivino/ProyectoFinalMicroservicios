apiVersion: 1
groups:
  - orgId: 1
    name: Microservicios Alert Group
    folder: Observability
    interval: 1m
    rules:
      - uid: rule-servicio-caido
        title: "Critico: Microservicio sin respuesta"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: count(up == 0)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: classic_conditions
        for: 1m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: "Uno o mas microservicios no responden a Prometheus."
          message: "ALERTA CRITICA: Prometheus detecto uno o mas microservicios caidos.\n\nQue significa:\n- La metrica `up` esta en 0 para al menos un target.\n- La condicion se mantuvo durante 1 minuto.\n- El valor de la alerta representa la cantidad de targets caidos.\n\nComo identificar el servicio:\n1. Abre Prometheus: http://localhost:9090/targets\n2. Busca el target marcado como DOWN.\n3. Revisa contenedores: docker-compose ps\n4. Revisa logs: docker-compose logs --tail=100 <servicio>\n5. Reinicia si aplica: docker-compose up -d <servicio>"
        labels:
          severity: critical

      - uid: rule-alta-tasa-errores
        title: "Advertencia: Tasa de errores elevada"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: "sum(rate(flask_http_request_total{code=~\"5..\"}[2m]) or rate(http_requests_received_total{status=~\"5..\"}[2m]) or rate(http_server_requests_seconds_count{status=~\"5..\"}[2m])) / sum(rate(flask_http_request_total[2m]) or rate(http_requests_received_total[2m]) or rate(http_server_requests_seconds_count[2m]))"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: classic_conditions
        for: 2m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: "La tasa de errores 5xx supera el umbral configurado."
          message: "ADVERTENCIA: Los microservicios estan retornando demasiados errores.\n\nQue significa:\n- Los errores HTTP 5xx superan el 10% del trafico.\n- La condicion se mantuvo durante 2 minutos.\n\nComo investigar:\n1. Abre Grafana y revisa el dashboard de Observabilidad.\n2. Identifica que servicio esta generando errores.\n3. Consulta logs estructurados en Loki.\n4. Verifica dependencias como bases de datos, RabbitMQ o servicios externos."
        labels:
          severity: warning
