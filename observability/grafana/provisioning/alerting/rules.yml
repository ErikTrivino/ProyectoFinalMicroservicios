apiVersion: 1
groups:
  - orgId: 1
    name: Microservicios Alert Group
    folder: Observability
    interval: 1m
    rules:
      - uid: rule-servicio-caido
        title: "🔴 Crítico: Microservicio Sin Respuesta"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: count(up == 0) > 0
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        for: 1m
        noDataState: OK
        execErrState: Error
        annotations:
          message: "🚨 ALERTA CRÍTICA: Uno o más microservicios no responden a Prometheus.\n\n📋 Detalles:\n- Estado: No disponible\n- Duración: +1 minuto\n\n🔧 Acciones recomendadas:\n1. Verifica el estado de los contenedores: `docker ps`\n2. Revisa los logs: `docker logs [nombre-servicio]`\n3. Reinicia el servicio si es necesario\n4. Consulta Prometheus para identificar qué servicio falla"
        labels:
          severity: critical

      - uid: rule-alta-tasa-errores
        title: "⚠️ Advertencia: Tasa de Errores Elevada"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: "sum(rate(flask_http_request_total{code=~\"5..\"}[2m]) or rate(http_requests_received_total{status=~\"5..\"}[2m]) or rate(http_server_requests_seconds_count{status=~\"5..\"}[2m])) / sum(rate(flask_http_request_total[2m]) or rate(http_requests_received_total[2m]) or rate(http_server_requests_seconds_count[2m]))"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: classic_conditions
        for: 2m
        noDataState: OK
        execErrState: Error
        annotations:
          message: "⚠️ ADVERTENCIA: Los microservicios están retornando demasiados errores.\n\n📊 Métrica:\n- Errores 5xx: >10% del tráfico\n- Duración: 2+ minutos\n\n🔍 Investigación:\n1. Abre Grafana y revisa el dashboard de Observabilidad\n2. Identifica qué servicio está generando errores\n3. Consulta los logs estructurados en Loki\n4. Verifica la disponibilidad de dependencias (BD, APIs externas)"
        labels:
          severity: warning
