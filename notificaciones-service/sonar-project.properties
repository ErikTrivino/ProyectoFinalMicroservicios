# ============================================================
# SonarQube Scanner Configuration
# notificaciones-service (.NET 10)
# ============================================================

sonar.projectKey=notificaciones-service
sonar.projectName=Notificaciones Service
sonar.projectVersion=1.0

# Directorios fuente
sonar.sources=.
sonar.inclusions=**/*.cs

# Exclusiones
sonar.exclusions=**/obj/**,**/bin/**,**/TestResults/**,**/NotificacionesService.Tests/**

# Reportes de cobertura (generados por Coverlet en formato OpenCover)
sonar.cs.opencover.reportPaths=TestResults/**/coverage.opencover.xml

# Encoding
sonar.sourceEncoding=UTF-8
