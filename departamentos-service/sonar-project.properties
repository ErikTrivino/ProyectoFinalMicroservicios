# ============================================================
# SonarQube Scanner Configuration
# departamentos-service (Python/Flask)
# ============================================================

sonar.projectKey=departamentos-service
sonar.projectName=Departamentos Service
sonar.projectVersion=1.0

# Directorios fuente
sonar.sources=.
sonar.inclusions=app.py

# Exclusiones
sonar.exclusions=test_app.py,__pycache__/**,*.pyc,.env

# Reportes de cobertura (generados por pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Lenguaje
sonar.language=py
