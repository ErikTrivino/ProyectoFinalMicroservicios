# ============================================================
# Test Configuration - perfiles-service
# Reto 6: Usa H2 en memoria para tests CI
# ============================================================

spring.application.name=perfiles-service-test

# Base de datos H2 en memoria (reemplaza PostgreSQL para tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA con H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Desactivar RabbitMQ para tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# JWT mock
jwt.secret=test-secret-key-for-testing

# Actuator
management.endpoints.web.exposure.include=health,info
